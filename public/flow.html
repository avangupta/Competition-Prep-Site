<!DOCTYPE html>
<html>
<body id="quiz">
<link rel="stylesheet" href="style.css">
<button id="back">Back</button>
<h1 id="title"></h1>

<div id="qCard" class="card">

  <h1 id="bot" style="min-height: 80px;"></h1>

  <h2 id="question" style="min-height: 80px;"></h2>

  <input id="answer" placeholder="Your answer" />
  <div class="option-group" id="options">
      <label id="cero" class="option-card">
        <input id="0" type="radio" name="mcq" value="">
        <span id="option0" class="option-title">-</span>
      </label>

      <label id="uno" class="option-card">
        <input id="1" type="radio" name="mcq" value="">
        <span id="option1" class="option-title">-</span>
      </label>

      <label id="dos" class="option-card">
        <input id="2" type="radio" name="mcq" value="">
        <span id="option2" class="option-title">-</span>
      </label>

      <label id="tres" class="option-card">
        <input id="3" type="radio" name="mcq" value="">
        <span id="option3" class="option-title">-</span>
      </label>
  </div>
  <button id="submitBtn" onclick="submit()">Submit</button>

  <p id="feedback"></p>
  <button id="nextBtn" style="display:none;">Next →</button>
  <button id="backBtn" style="display:none;">Back ⬅</button>

</div>

<script src="flow.js" defer></script>

</body>
</html>
