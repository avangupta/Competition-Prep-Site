<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<button onclick="location.href='/index.html'">← Back</button>

<h1></h1>

<div class="card">

    <h1>Your Profile</h1>

    <div class="config-card">

        <h2>Account</h2>

        <p><strong>Username:</strong> <span id="username">--</span></p>

        <p><strong>Linked to:</strong> <span id="email">--</span></p>

        <p><strong>Theme:</strong> <span id="theme">--</span></p>

    </div>

    <h2>Your Book</h2>

    <div class="book-container">

        <div class="topic-card">

            <div class="topic-header">

                <div class="topic-left">
                    <div class="expand-icon">▶</div>
                    <div class="topic-name">Earth Science</div>
                </div>

                <div class="topic-score">
                    <span id="Earth Science">--</span>
                </div>

            </div>

            <div class="subtopics">
                <!-- JS inserts subtopics here -->
            </div>

        </div>

        <div class="topic-card">

            <div class="topic-header">

                <div class="topic-left">
                    <div class="expand-icon">▶</div>
                    <div class="topic-name">Astronomy</div>
                </div>

                <div class="topic-score">
                    <span id="Astronomy">--</span>
                </div>

            </div>



            <div class="subtopics"></div>

        </div>

        <div class="topic-card">

            <div class="topic-header">

                <div class="topic-left">
                    <div class="expand-icon">▶</div>

                </div>

            </div>



            <div class="subtopics"></div>

        </div>

        <div class="topic-card">

            <div class="topic-header">

                    <div class="expand-icon">▶</div>

            <div class="subtopics"></div>

                <div class="topic-score">
                    <span id="History">--</span>

            </div>

            <div class="subtopics"></div>

        </div>

    </div>

</div>
